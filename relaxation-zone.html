<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relaxation Zone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --text-dark: #1a1c2e;
    --text-mid: #5a5f7a;
    --radius: 22px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding-bottom: 60px;
    background-image:
      radial-gradient(ellipse at 20% 10%, #dce8ff 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #e0f0ea 0%, transparent 50%);
  }
  header {
    display:flex; align-items:center; gap:16px;
    padding:28px 40px 20px;
    background:rgba(240,244,255,0.9);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(180,190,230,0.3);
  }
  .logo-icon {
    width:46px; height:46px; border-radius:14px;
    background:linear-gradient(135deg,#7a6cf8,#5b9cf6);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow:0 4px 14px rgba(122,108,248,.35);
  }
  .header-text h1 { font-family:'DM Serif Display',serif; font-size:1.65rem; color:var(--text-dark); }
  .header-text p  { font-size:.82rem; color:var(--text-mid); font-weight:300; }

  .grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:20px; padding:28px 40px;
    max-width:1000px; margin:0 auto;
  }
  .card {
    border-radius:var(--radius); padding:30px 26px 24px;
    border:1.5px solid rgba(255,255,255,0.9);
    box-shadow:0 4px 24px rgba(0,0,0,.06);
    transition:transform .25s, box-shadow .25s;
  }
  .card:hover  { transform:translateY(-4px); box-shadow:0 12px 36px rgba(0,0,0,.1); }
  .card.active { border-color:#fff; box-shadow:0 8px 40px rgba(0,0,0,.13); }

  .card-ocean  { background:#e8eeff; }
  .card-rain   { background:#eef0f8; }
  .card-forest { background:#e8f5ef; }
  .card-medi   { background:#f5eeff; }

  .icon-wrap {
    width:56px; height:56px; border-radius:15px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; margin-bottom:18px;
    box-shadow:0 4px 14px rgba(0,0,0,.15);
  }
  .icon-ocean  { background:linear-gradient(135deg,#5b9cf6,#3a75e8); }
  .icon-rain   { background:linear-gradient(135deg,#7a8fb8,#506090); }
  .icon-forest { background:linear-gradient(135deg,#4cd48a,#28a05a); }
  .icon-medi   { background:linear-gradient(135deg,#e060f0,#a030c0); }

  .card h2 { font-family:'DM Serif Display',serif; font-size:1.3rem; color:var(--text-dark); margin-bottom:6px; }
  .card p  { font-size:.86rem; color:var(--text-mid); font-weight:300; margin-bottom:20px; line-height:1.5; }

  .play-btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 22px; border-radius:50px; border:none;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:.88rem; font-weight:600; cursor:pointer;
    transition:transform .2s, filter .2s;
  }
  .play-btn:hover  { transform:scale(1.05); filter:brightness(1.08); }
  .play-btn:active { transform:scale(0.96); }
  .btn-ocean  { background:linear-gradient(135deg,#5b9cf6,#3a75e8); color:#fff; box-shadow:0 4px 16px rgba(74,128,240,.4); }
  .btn-rain   { background:linear-gradient(135deg,#7a8fb8,#4f6590); color:#fff; box-shadow:0 4px 16px rgba(91,122,168,.35); }
  .btn-forest { background:linear-gradient(135deg,#4cd48a,#28a05a); color:#fff; box-shadow:0 4px 16px rgba(56,178,106,.4); }
  .btn-medi   { background:linear-gradient(135deg,#e060f0,#a030c0); color:#fff; box-shadow:0 4px 16px rgba(192,80,216,.4); }

  .vol-row { display:flex; align-items:center; gap:8px; margin-top:14px; }
  .vol-row span { font-size:.8rem; }
  input[type=range] {
    flex:1; -webkit-appearance:none; height:4px;
    background:rgba(0,0,0,.14); border-radius:2px; outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.3); cursor:pointer;
  }

  .waveform { display:inline-flex; align-items:center; gap:3px; height:16px; vertical-align:middle; }
  .bar { width:3px; border-radius:2px; background:rgba(255,255,255,.9); animation:wave .8s ease-in-out infinite; }
  .bar:nth-child(1){height:5px;  animation-delay:0s;}
  .bar:nth-child(2){height:11px; animation-delay:.15s;}
  .bar:nth-child(3){height:16px; animation-delay:.3s;}
  .bar:nth-child(4){height:9px;  animation-delay:.45s;}
  .bar:nth-child(5){height:6px;  animation-delay:.6s;}
  @keyframes wave { 0%,100%{transform:scaleY(.5)} 50%{transform:scaleY(1)} }

  .toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(70px);
    background:rgba(26,28,46,.92); color:#fff;
    padding:11px 24px; border-radius:50px; font-size:.84rem; font-weight:500;
    backdrop-filter:blur(12px);
    transition:transform .4s cubic-bezier(.22,.68,0,1.2), opacity .4s;
    opacity:0; pointer-events:none; z-index:99;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  @media(max-width:640px){
    .grid { grid-template-columns:1fr; padding:16px 20px; }
    header { padding:20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🌊</div>
  <div class="header-text">
    <h1>Relaxation Zone</h1>
    <p>Find your calm</p>
  </div>
</header>

<div class="grid">

  <div class="card card-ocean" id="card-ocean">
    <div class="icon-wrap icon-ocean">🌊</div>
    <h2>Ocean Waves</h2>
    <p>Gentle waves lapping on the shore</p>
    <button class="play-btn btn-ocean" id="btn-ocean" onclick="toggle('ocean')">▶ Play</button>
    <div class="vol-row">
      <span>🔈</span>
      <input type="range" min="0" max="1" step="0.01" value="0.7" oninput="setVol('ocean',+this.value)">
      <span>🔊</span>
    </div>
  </div>

  <div class="card card-rain" id="card-rain">
    <div class="icon-wrap icon-rain">🌧️</div>
    <h2>Rainfall</h2>
    <p>Soft rain on a quiet afternoon</p>
    <button class="play-btn btn-rain" id="btn-rain" onclick="toggle('rain')">▶ Play</button>
    <div class="vol-row">
      <span>🔈</span>
      <input type="range" min="0" max="1" step="0.01" value="0.7" oninput="setVol('rain',+this.value)">
      <span>🔊</span>
    </div>
  </div>

  <div class="card card-forest" id="card-forest">
    <div class="icon-wrap icon-forest">🍃</div>
    <h2>Forest Breeze</h2>
    <p>Wind through the trees</p>
    <button class="play-btn btn-forest" id="btn-forest" onclick="toggle('forest')">▶ Play</button>
    <div class="vol-row">
      <span>🔈</span>
      <input type="range" min="0" max="1" step="0.01" value="0.7" oninput="setVol('forest',+this.value)">
      <span>🔊</span>
    </div>
  </div>

  <div class="card card-medi" id="card-medi">
    <div class="icon-wrap icon-medi">🎵</div>
    <h2>Meditation Music</h2>
    <p>Calming instrumental tones</p>
    <button class="play-btn btn-medi" id="btn-medi" onclick="toggle('medi')">▶ Play</button>
    <div class="vol-row">
      <span>🔈</span>
      <input type="range" min="0" max="1" step="0.01" value="0.7" oninput="setVol('medi',+this.value)">
      <span>🔊</span>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
/* ── Audio context ─────────────────────────────────────────────── */
let AC = null;
function ac() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

/* ── Noise generators ─────────────────────────────────────────── */
function mkWhite(secs) {
  const a = ac(), len = a.sampleRate * secs;
  const b = a.createBuffer(1, len, a.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return b;
}
function mkPink(secs) {
  const a = ac(), len = a.sampleRate * secs;
  const b = a.createBuffer(1, len, a.sampleRate);
  const d = b.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < len; i++) {
    const w = Math.random()*2-1;
    b0=.99886*b0+w*.0555179; b1=.99332*b1+w*.0750759;
    b2=.96900*b2+w*.1538520; b3=.86650*b3+w*.3104856;
    b4=.55000*b4+w*.5329522; b5=-.7616*b5-w*.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*0.11; b6=w*.115926;
  }
  return b;
}

/* ── Playing state ────────────────────────────────────────────── */
const playing = {};
const vols    = { ocean:.7, rain:.7, forest:.7, medi:.7 };
const MULT    = { ocean:.35, rain:.45, forest:.35, medi:.18 };

/* ── OCEAN ────────────────────────────────────────────────────── */
function buildOcean(vol) {
  const a = ac();
  const src = a.createBufferSource();
  src.buffer = mkWhite(8); src.loop = true;

  const lp = a.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 500; lp.Q.value = 1.2;

  const lfo = a.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.09;
  const lfoG = a.createGain(); lfoG.gain.value = 340;
  lfo.connect(lfoG); lfoG.connect(lp.frequency);

  const vLfo = a.createOscillator();
  vLfo.frequency.value = 0.07;
  const vLfoG = a.createGain(); vLfoG.gain.value = .28;
  vLfo.connect(vLfoG);

  const mg = a.createGain(); mg.gain.value = vol * MULT.ocean;
  vLfoG.connect(mg.gain);
  src.connect(lp); lp.connect(mg); mg.connect(a.destination);
  src.start(); lfo.start(); vLfo.start();

  return {
    gain: mg,
    stop() {
      mg.gain.setTargetAtTime(0, a.currentTime, .4);
      setTimeout(() => [src,lfo,vLfo].forEach(n=>{try{n.stop()}catch(e){}}), 1500);
    }
  };
}

/* ── RAIN ─────────────────────────────────────────────────────── */
function buildRain(vol) {
  const a = ac();
  const mg = a.createGain(); mg.gain.value = vol * MULT.rain; mg.connect(a.destination);
  const srcs = [];
  [{f:600,q:1.5,g:.55},{f:1800,q:1.2,g:.40},{f:4000,q:.9,g:.28},{f:8500,q:.7,g:.14}]
    .forEach(l => {
      const s = a.createBufferSource();
      s.buffer = mkWhite(4); s.loop = true;
      const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=l.f; bp.Q.value=l.q;
      const g  = a.createGain(); g.gain.value = l.g;
      s.connect(bp); bp.connect(g); g.connect(mg); s.start(); srcs.push(s);
    });

  let dT;
  (function drip() {
    const a2 = ac();
    const o = a2.createOscillator(); o.type='sine'; o.frequency.value=900+Math.random()*1200;
    const e = a2.createGain();
    e.gain.setValueAtTime(0, a2.currentTime);
    e.gain.linearRampToValueAtTime(vol*.05, a2.currentTime+.01);
    e.gain.exponentialRampToValueAtTime(.0001, a2.currentTime+.28);
    o.connect(e); e.connect(a2.destination);
    o.start(); o.stop(a2.currentTime+.32);
    dT = setTimeout(drip, 300+Math.random()*1400);
  })();

  return {
    gain: mg,
    stop() {
      clearTimeout(dT);
      mg.gain.setTargetAtTime(0, a.currentTime, .4);
      setTimeout(() => srcs.forEach(s=>{try{s.stop()}catch(e){}}), 1500);
    }
  };
}

/* ── FOREST ───────────────────────────────────────────────────── */
function buildForest(vol) {
  const a = ac();
  const src = a.createBufferSource(); src.buffer = mkPink(8); src.loop = true;
  const hp = a.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=280;
  const lp = a.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=2600;

  const lfo = a.createOscillator(); lfo.frequency.value=.08;
  const lfoG = a.createGain(); lfoG.gain.value=.25; lfo.connect(lfoG);

  const mg = a.createGain(); mg.gain.value = vol * MULT.forest;
  lfoG.connect(mg.gain);
  src.connect(hp); hp.connect(lp); lp.connect(mg); mg.connect(a.destination);
  src.start(); lfo.start();

  let bT;
  (function chirp() {
    const a2 = ac(), f = 2100+Math.random()*1600;
    for (let i=0;i<3;i++) {
      const o = a2.createOscillator(); o.type='sine'; o.frequency.value=f+i*130;
      const e = a2.createGain(), t0 = a2.currentTime+i*.13;
      e.gain.setValueAtTime(0,t0); e.gain.linearRampToValueAtTime(vol*.07,t0+.04);
      e.gain.exponentialRampToValueAtTime(.0001,t0+.2);
      o.connect(e); e.connect(a2.destination); o.start(t0); o.stop(t0+.25);
    }
    bT = setTimeout(chirp, 3500+Math.random()*7000);
  })();

  return {
    gain: mg,
    stop() {
      clearTimeout(bT);
      mg.gain.setTargetAtTime(0, a.currentTime, .4);
      setTimeout(() => [src,lfo].forEach(n=>{try{n.stop()}catch(e){}}), 1500);
    }
  };
}

/* ── MEDITATION ───────────────────────────────────────────────── */
function buildMedi(vol) {
  const a = ac();
  const mg = a.createGain(); mg.gain.value = vol * MULT.medi;

  // Reverb tail via delay network
  const dly = a.createDelay(3); dly.delayTime.value=1.9;
  const fb  = a.createGain(); fb.gain.value=.48;
  const wet = a.createGain(); wet.gain.value=.55;
  dly.connect(fb); fb.connect(dly); dly.connect(wet);
  mg.connect(dly); mg.connect(a.destination); wet.connect(a.destination);

  // Pentatonic drone C3–G4
  const oscs = [];
  [130.81,196,261.63,329.63,392].forEach((f,i) => {
    const o = a.createOscillator();
    o.type = i<2 ? 'sine' : 'triangle';
    o.frequency.value = f; o.detune.value = (Math.random()-.5)*7;
    const g = a.createGain();
    g.gain.setValueAtTime(0, a.currentTime);
    g.gain.linearRampToValueAtTime(.25-i*.033, a.currentTime+1.5+i*.7);
    o.connect(g); g.connect(mg); o.start(); oscs.push(o);
  });

  // Sub-bass pad (pink noise + lowpass)
  const ns = a.createBufferSource(); ns.buffer=mkPink(6); ns.loop=true;
  const nlp = a.createBiquadFilter(); nlp.type='lowpass'; nlp.frequency.value=160;
  const ng = a.createGain(); ng.gain.value=.09;
  ns.connect(nlp); nlp.connect(ng); ng.connect(mg); ns.start();

  // Singing bowl @ 432 Hz every 9s
  let bellT;
  (function bell() {
    const a2 = ac();
    const o = a2.createOscillator(); o.type='sine'; o.frequency.value=432;
    const e = a2.createGain();
    e.gain.setValueAtTime(0, a2.currentTime);
    e.gain.linearRampToValueAtTime(vol*.2, a2.currentTime+.03);
    e.gain.exponentialRampToValueAtTime(.0001, a2.currentTime+5.5);
    o.connect(e); e.connect(dly); e.connect(a2.destination);
    o.start(); o.stop(a2.currentTime+6);
    bellT = setTimeout(bell, 9000);
  })();

  return {
    gain: mg,
    stop() {
      clearTimeout(bellT);
      mg.gain.setTargetAtTime(0, a.currentTime, .5);
      setTimeout(() => {
        oscs.forEach(o=>{try{o.stop()}catch(e){}});
        try{ns.stop()}catch(e){}
      }, 2000);
    }
  };
}

/* ── UI ───────────────────────────────────────────────────────── */
const BUILDERS = { ocean:buildOcean, rain:buildRain, forest:buildForest, medi:buildMedi };
const NAMES    = { ocean:'🌊 Ocean Waves', rain:'🌧️ Rainfall', forest:'🍃 Forest Breeze', medi:'🎵 Meditation Music' };

function toggle(id) {
  if (playing[id]) {
    playing[id].stop();
    delete playing[id];
    setUI(id, false);
    toast('⏹ Stopped');
  } else {
    try {
      playing[id] = BUILDERS[id](vols[id]);
      setUI(id, true);
      toast('Now playing ' + NAMES[id]);
    } catch(err) {
      toast('⚠️ Audio blocked – please allow audio in your browser');
      console.error(err);
    }
  }
}

function setVol(id, v) {
  vols[id] = v;
  if (playing[id]?.gain) {
    playing[id].gain.gain.setTargetAtTime(v * MULT[id], ac().currentTime, .05);
  }
}

function setUI(id, on) {
  const btn  = document.getElementById('btn-'+id);
  const card = document.getElementById('card-'+id);
  if (on) {
    btn.innerHTML = '<div class="waveform"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>&nbsp; Stop';
    card.classList.add('active');
  } else {
    btn.innerHTML = '▶ Play';
    card.classList.remove('active');
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
